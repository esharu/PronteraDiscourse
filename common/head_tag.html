<!--
  Load the two brand faces (docs/branding.md → "Typografie"):
    - Cinzel   → display font, brand wordmark / hero / static-page H1 only
    - Inter    → all UI and body text
  Weights mirror the Nuxt @nuxt/fonts config (Cinzel 600/700, Inter 400-700).
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
/>

<script type="text/discourse-plugin" version="0.8">
  // Bridge theme settings onto data-attributes so the SCSS can resolve the
  // active accent / toggles without a build-time branch.
  const root = document.documentElement;
  root.setAttribute("data-prontera-accent", settings.accent_color || "verdigris");
  root.setAttribute("data-prontera-texture", settings.parchment_texture ? "on" : "off");
  root.setAttribute("data-prontera-wordmark", settings.brand_wordmark ? "on" : "off");
</script>

<!--
  Cookie consent via Klaro! (open-source CMP, self-hostable) — GA4 loads ONLY
  after the visitor consents to the "google-analytics" service. Klaro assets
  load from a pinned jsDelivr build; to self-host, drop klaro.js / klaro.min.css
  into the theme and point KLARO_BASE at their uploaded URLs.
-->
<script type="text/discourse-plugin" version="0.8">
  if (settings.consent_enabled) {
    const gaId = (settings.ga4_measurement_id || "").trim();

    // gtag.js loader — invoked by Klaro only once the analytics service is granted.
    window.pronteraLoadGA = function () {
      if (!gaId || window.__pronteraGALoaded) return;
      window.__pronteraGALoaded = true;
      window["ga-disable-" + gaId] = false;
      const s = document.createElement("script");
      s.async = true;
      s.src = "https://www.googletagmanager.com/gtag/js?id=" + encodeURIComponent(gaId);
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      window.gtag = function () { window.dataLayer.push(arguments); };
      window.gtag("js", new Date());
      window.gtag("config", gaId, { anonymize_ip: true });
    };

    window.klaroConfig = {
      version: 1,
      elementID: "klaro",
      storageMethod: "cookie",
      cookieName: "prontera_consent",
      cookieExpiresAfterDays: 365,
      htmlTexts: true,
      default: false,
      mustConsent: false,
      acceptAll: true,
      hideDeclineAll: false,
      privacyPolicy: settings.privacy_policy_url || "/privacy",
      translations: {
        zz: { privacyPolicyUrl: settings.privacy_policy_url || "/privacy" },
        en: {
          consentModal: {
            title: "Privacy settings",
            description:
              "We use cookies only to understand how the community is used. Nothing loads until you agree. Prontera.info is a non-commercial fan project.",
          },
          consentNotice: {
            description:
              "We'd like to use analytics cookies to improve the site. {purposes} — no analytics run without your consent.",
            learnMore: "Let me choose",
          },
          purposes: { analytics: "Analytics" },
          "google-analytics": { title: "Google Analytics 4", description: "Anonymized usage statistics (page views, referrers)." },
          ok: "Accept",
          acceptAll: "Accept all",
          acceptSelected: "Accept selected",
          decline: "Decline",
          save: "Save",
          close: "Close",
        },
        de: {
          consentModal: {
            title: "Datenschutz-Einstellungen",
            description:
              "Wir nutzen Cookies nur, um zu verstehen, wie die Community genutzt wird. Es lädt nichts, bevor du zustimmst. Prontera.info ist ein nicht-kommerzielles Fan-Projekt.",
          },
          consentNotice: {
            description:
              "Wir würden gern Analyse-Cookies zur Verbesserung der Seite einsetzen. {purposes} — ohne deine Zustimmung läuft keine Analyse.",
            learnMore: "Auswählen",
          },
          purposes: { analytics: "Statistik" },
          "google-analytics": { title: "Google Analytics 4", description: "Anonymisierte Nutzungsstatistik (Seitenaufrufe, Verweise)." },
          ok: "Akzeptieren",
          acceptAll: "Alle akzeptieren",
          acceptSelected: "Auswahl akzeptieren",
          decline: "Ablehnen",
          save: "Speichern",
          close: "Schließen",
        },
      },
      services: [
        {
          name: "google-analytics",
          title: "Google Analytics 4",
          purposes: ["analytics"],
          cookies: [[/^_ga.*$/i], [/^_gid$/i], [/^_gat.*$/i]],
          required: false,
          optOut: false,
          default: false,
          callback: function (consent) {
            if (consent) {
              window.pronteraLoadGA();
            } else if (gaId) {
              window["ga-disable-" + gaId] = true;
            }
          },
        },
      ],
    };

    const KLARO_BASE = "https://cdn.jsdelivr.net/npm/klaro@0.7.22/dist";
    const css = document.createElement("link");
    css.rel = "stylesheet";
    css.href = KLARO_BASE + "/klaro.min.css";
    document.head.appendChild(css);
    const js = document.createElement("script");
    js.defer = true;
    js.src = KLARO_BASE + "/klaro.js";
    js.setAttribute("data-config", "klaroConfig");
    document.head.appendChild(js);
  }
</script>
