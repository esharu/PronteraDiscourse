<!--
  The brand faces (Cinzel, Inter) are self-hosted as theme assets and declared
  via @font-face in common.scss — no request to Google Fonts (avoids the German
  GDPR issue with fonts.gstatic.com). See docs/branding.md → "Typografie".
-->
<script type="text/discourse-plugin" version="0.8">
  // Bridge theme settings onto data-attributes so the SCSS can resolve the
  // active accent / toggles without a build-time branch.
  const root = document.documentElement;
  root.setAttribute("data-prontera-accent", settings.accent_color || "verdigris");
  root.setAttribute("data-prontera-texture", settings.parchment_texture ? "on" : "off");
  root.setAttribute("data-prontera-wordmark", settings.brand_wordmark ? "on" : "off");
</script>

<!--
  Cookie consent (Klaro!) and GA4 are wired up in the prontera-consent
  api-initializer, which loads the self-hosted klaro.js theme asset via
  Discourse's loadScript() helper. head_tag is not a reliable place to load
  vendor JS in the SPA.
-->
