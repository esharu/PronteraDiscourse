de:
  theme_metadata:
    description: "Prontera-Marken-Skin fürs Community-Forum — dark-first Dual-Farbschema, Cinzel/Inter-Typografie und die Design-Sprache des Whitelabel-Hubs."
    settings:
      accent_color: "Interaktiver Akzent (Links, Buttons, aktive Tabs). Verdigris ist der gemeinsame Portal-Akzent; Banner Red / Gold passen zu den RO3-/ROZ-Siegeln."
